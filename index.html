<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lehrer-Plan Mobil</title>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --text: #f8fafc;
            --accent: #38bdf8; --highlight: #22c55e;
            --k11: #a855f7; /* Violett für 11. Klasse */
            --glass: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 15px; }

        header { text-align: center; padding: 20px; background: var(--panel); border-radius: 15px; margin-bottom: 20px; border-bottom: 4px solid var(--accent); }
        .time { font-size: 2.5rem; font-weight: 800; }
        
        #quote-display { background: var(--accent); color: var(--bg); padding: 10px; border-radius: 8px; text-align: center; font-weight: 700; margin-bottom: 20px; font-size: 0.9rem; }

        h2 { color: var(--accent); font-size: 1.2rem; text-transform: uppercase; margin-top: 30px; border-left: 4px solid var(--accent); padding-left: 10px; }

        /* Lehrer Karten */
        .lehrer-card { background: var(--panel); border-radius: 15px; padding: 15px; margin-bottom: 15px; position: relative; border-left: 5px solid transparent; }
        .is-present { border-left-color: var(--highlight); }
        .is-teaching-11 { border-left-color: var(--k11); box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }

        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; background: #444; }
        .dot-online { background: var(--highlight); box-shadow: 0 0 8px var(--highlight); }

        .lehrer-name { font-size: 1.1rem; font-weight: 800; }
        .lehrer-sub { font-size: 0.85rem; opacity: 0.7; margin-bottom: 10px; }

        .badge-11 { background: var(--k11); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 900; float: right; }

        /* Mini Wochenplan im Lehrer-Feld */
        .mini-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
        .day-box { background: var(--glass); text-align: center; padding: 5px; border-radius: 5px; font-size: 0.7rem; color: #888; }
        .day-active { background: rgba(34, 197, 94, 0.2); color: var(--highlight); font-weight: bold; }

    </style>
</head>
<body>

<header>
    <div id="date-display" style="opacity: 0.6; font-size: 0.9rem;">---</div>
    <div class="time" id="clock">00:00</div>
</header>

<div id="quote-display">Lade Zitat...</div>

<section id="live-section">
    <h2>Lehrer Live-Status</h2>
    <div id="lehrer-container">Wird geladen...</div>
</section>

<script>
    const quotes = ["Focus on.", "Viel Erfolg!", "Dummheit ist eine Begabung.", "Vertrauen ist gut, Kontrolle ist besser."];
    let SCHOOL_DATA = {};
    const daysShort = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];

    function timeToMin(t) {
        if(!t || !t.includes(':')) return -1;
        const [h, m] = t.split(':').map(Number);
        return h * 60 + m;
    }

    async function loadData() {
        try {
            const r = await fetch('data.json?t=' + Date.now());
            SCHOOL_DATA = await r.json();
            renderLehrer();
        } catch(e) { console.error("Fehler"); }
    }

    function renderLehrer() {
        const now = new Date();
        const curMin = now.getHours() * 60 + now.getMinutes();
        const today = now.getDay(); // 1=Mo, 2=Di...
        
        const container = document.getElementById('lehrer-container');
        let html = "";

        (SCHOOL_DATA.lehrerPlan || []).forEach(l => {
            let isPresent = false;
            let teaching11 = false;
            
            // Check ob JETZT da
            if(l.zeiten && l.zeiten[today]) {
                l.zeiten[today].forEach(z => {
                    const s = timeToMin(z[0]), e = timeToMin(z[1]);
                    if(curMin >= s && curMin < e) {
                        isPresent = true;
                        if(z[2] === "11") teaching11 = true;
                    }
                });
            }

            html += `
                <div class="lehrer-card ${isPresent ? 'is-present' : ''} ${teaching11 ? 'is-teaching-11' : ''}">
                    ${teaching11 ? '<span class="badge-11">JETZT BEI KLASSE 11</span>' : ''}
                    <div class="lehrer-name">
                        <span class="status-dot ${isPresent ? 'dot-online' : ''}"></span>
                        ${l.name}
                    </div>
                    <div class="lehrer-sub">${l.fach}</div>
                    
                    <div class="mini-grid">
                        ${[1,2,3,4,5].map(d => `
                            <div class="day-box ${l.zeiten && l.zeiten[d] && l.zeiten[d].some(z => z[0]!=='') ? 'day-active' : ''}">
                                ${daysShort[d]}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('date-display').textContent = now.toLocaleDateString('de-DE', {weekday:'long', day:'2-digit', month:'short'});
        
        // Zitat alle 30 Sek wechseln
        if(now.getSeconds() % 30 === 0) {
            document.getElementById('quote-display').textContent = quotes[Math.floor(Math.random() * quotes.length)];
        }
    }

    setInterval(updateTime, 1000);
    setInterval(loadData, 30000);
    loadData();
    updateTime();
    document.getElementById('quote-display').textContent = quotes[0];
</script>
</body>
</html>
