<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schul-Plan Mobile</title>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --text: #f8fafc;
            --accent: #38bdf8; --highlight: #22c55e;
            --warning: #ef4444; --pause: #f59e0b;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 15px; 
            overflow-x: hidden;
        }

        /* Header Fixiert */
        header {
            background: var(--panel);
            padding: 15px;
            border-radius: 15px;
            border-bottom: 3px solid var(--accent);
            margin-bottom: 20px;
            text-align: center;
        }
        .live-time { font-size: 2.5rem; font-weight: 800; color: var(--text); }
        .seconds { font-size: 1rem; color: var(--accent); opacity: 0.7; }

        /* Zitat-Banner */
        #msg-ticker {
            background: var(--accent); color: var(--bg);
            padding: 12px; border-radius: 10px;
            font-weight: 700; text-align: center;
            margin-bottom: 20px; font-size: 1rem;
        }

        h2 { color: var(--accent); font-size: 1.2rem; text-transform: uppercase; margin: 25px 0 10px 5px; }

        /* Karten Layout */
        .card {
            background: var(--panel);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid var(--accent);
        }

        /* Live Status (Impulse) */
        .impuls-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .impuls-row:last-child { border: none; }
        .class-name { font-weight: 800; color: var(--accent); }
        .subject { font-weight: 600; }
        .time-left { background: var(--highlight); padding: 3px 8px; border-radius: 5px; font-size: 0.8rem; font-weight: 900; }

        /* Lehrer Liste */
        .lehrer-item {
            display: inline-block;
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 8px;
            margin: 4px;
            font-size: 0.9rem;
        }

        /* Plan Tabelle Mini */
        .scroll-box { overflow-x: auto; background: var(--panel); border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th, td { padding: 10px; text-align: center; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--accent); background: rgba(0,0,0,0.2); }
        .active-cell { background: var(--highlight) !important; color: white; font-weight: bold; }

    </style>
</head>
<body>

<header>
    <div id="live-date" style="font-size: 0.9rem; opacity: 0.7;">---</div>
    <div class="live-time"><span id="h-m">00:00</span><span id="sec" class="seconds">00</span></div>
</header>

<div id="msg-ticker">Lade Zitat...</div>

<section id="live-impulse">
    <h2>Nächste Impulse</h2>
    <div class="card" id="impulse-container">Lade...</div>
</section>

<section id="lehrer-status">
    <h2>Lehrkräfte im Haus</h2>
    <div class="card" id="lehrer-container">Keine Daten</div>
</section>

<section id="klassen-plan">
    <h2 id="plan-title">Wochenplan (Heute)</h2>
    <div class="scroll-box">
        <table id="table-today">
            <thead><tr id="table-head"><th>Zeit</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</section>

<script>
    const quotes = ["Focus on.", "Stay focused.", "Viel Erfolg heute.", "Suche nach Lösungen.", "Vertrauen ist gut - Kontrolle ist besser"];
    let currentQuote = quotes[0];
    let SCHOOL_DATA = { uliMessage: "", infoSlideText: "", lehrerPlan: [], fullSchedules: {} };
    
    const slots = [
        { s: "08:30", e: "09:00" }, { s: "09:10", e: "09:40" }, { s: "09:50", e: "10:20" }, 
        { s: "10:30", e: "11:00" }, { s: "11:10", e: "11:40" }, { s: "11:50", e: "12:20" }, 
        { s: "12:30", e: "13:00" }, { s: "13:00", e: "13:35", label: "MITTAGS" },
        { s: "13:40", e: "14:10" }, { s: "14:15", e: "14:45" }, { s: "14:55", e: "15:25" }, { s: "15:30", e: "16:00" }
    ];

    async function fetchData() {
        try {
            const resp = await fetch('data.json?t=' + Date.now());
            SCHOOL_DATA = await resp.json();
            updateUI();
        } catch (e) { console.error("Datenfehler"); }
    }

    function timeToMin(t) {
        const [h, m] = t.split(':').map(Number);
        return h * 60 + m;
    }

    function updateUI() {
        const now = new Date();
        const h = now.getHours(), m = now.getMinutes(), day = now.getDay(), curMin = h * 60 + m;

        // Header & Zeit
        document.getElementById('h-m').textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        document.getElementById('sec').textContent = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('live-date').textContent = now.toLocaleDateString('de-DE', {weekday:'long', day:'2-digit', month:'short'});

        // Ticker (Status / Zitat)
        const ticker = document.getElementById('msg-ticker');
        let activeIdx = slots.findIndex(s => curMin >= timeToMin(s.s) && curMin < timeToMin(s.e));
        if (h >= 16) ticker.textContent = "Feierabend!";
        else if (activeIdx !== -1 && slots[activeIdx].label) ticker.textContent = slots[activeIdx].label;
        else ticker.textContent = currentQuote;

        // Impulse (Mobile kompakt)
        let impHtml = "";
        ["10","11","12"].forEach(c => {
            const dayPlan = SCHOOL_DATA.fullSchedules[c]?.[day];
            const nextSlot = slots.find(s => timeToMin(s.s) >= curMin && dayPlan?.[s.s]);
            if(nextSlot) {
                impHtml += `<div class="impuls-row"><span class="class-name">Klasse ${c}</span><span class="subject">${dayPlan[nextSlot.s]}</span><span class="time-left">${nextSlot.s}</span></div>`;
            }
        });
        document.getElementById('impulse-container').innerHTML = impHtml || "Keine Impulse mehr heute.";

        // Lehrer
        let lehrerHtml = "";
        (SCHOOL_DATA.lehrerPlan || []).forEach(l => {
            let here = false;
            if(l.zeiten?.[day]) l.zeiten[day].forEach(s => { if(curMin >= timeToMin(s[0]) && curMin < timeToMin(s[1])) here = true; });
            if(here) lehrerHtml += `<div class="lehrer-item">👤 ${l.name} (${l.fach})</div>`;
        });
        document.getElementById('lehrer-container').innerHTML = lehrerHtml || "Aktuell niemand im Haus.";

        // Plan Tabelle (Heute-Ansicht)
        if(day >= 1 && day <= 5) {
            let tableBody = "";
            slots.forEach(slot => {
                const isActive = (curMin >= timeToMin(slot.s) && curMin < timeToMin(slot.e));
                tableBody += `<tr><td style="color:var(--accent)">${slot.s}</td>`;
                ["10","11","12"].forEach(c => {
                    const fach = slot.label || SCHOOL_DATA.fullSchedules[c]?.[day]?.[slot.s] || "-";
                    tableBody += `<td class="${isActive ? 'active-cell' : ''}">${fach}</td>`;
                });
                tableBody += `</tr>`;
            });
            document.getElementById('table-head').innerHTML = `<th>Zeit</th><th>K10</th><th>K11</th><th>K12</th>`;
            document.getElementById('table-body').innerHTML = tableBody;
        } else {
            document.getElementById('klassen-plan').innerHTML = "<h2>Wochenende</h2><div class='card'>Genieß die freie Zeit!</div>";
        }
    }

    // Intervalle
    setInterval(updateUI, 1000);
    setInterval(fetchData, 30000);
    setInterval(() => { currentQuote = quotes[Math.floor(Math.random() * quotes.length)]; }, 60000);
    
    fetchData();
</script>

</body>
</html>
