<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schul-Plan Mobile</title>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --text: #f8fafc;
            --accent: #38bdf8; --highlight: #22c55e;
            --warning: #ef4444; --pause: #f59e0b;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; line-height: 1.4; }

        header {
            background: var(--panel); padding: 15px; border-radius: 15px;
            border-bottom: 3px solid var(--accent); margin-bottom: 15px; text-align: center;
        }
        .live-time { font-size: 2.2rem; font-weight: 800; }
        
        #msg-ticker {
            background: var(--accent); color: var(--bg); padding: 12px;
            border-radius: 10px; font-weight: 700; text-align: center;
            margin-bottom: 20px; font-size: 0.9rem; text-transform: uppercase;
        }

        h2 { color: var(--accent); font-size: 1.1rem; text-transform: uppercase; margin: 25px 0 10px 5px; border-left: 4px solid var(--accent); padding-left: 10px; }

        .card { background: var(--panel); border-radius: 12px; padding: 12px; margin-bottom: 15px; }

        /* Lehrer Wochen-Style */
        .lehrer-card { border-left: 4px solid var(--highlight); margin-bottom: 10px; }
        .lehrer-name { font-weight: 800; font-size: 1rem; display: block; }
        .lehrer-info { font-size: 0.8rem; opacity: 0.7; margin-bottom: 5px; }
        .day-badge { 
            display: inline-block; font-size: 0.7rem; padding: 2px 6px; 
            border-radius: 4px; margin-right: 3px; background: rgba(255,255,255,0.1); 
        }
        .has-time { background: var(--highlight) !important; color: white; }

        /* Tabellen Scrollbar für Mobile */
        .scroll-box { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 20px; border-radius: 10px; background: #000; }
        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th, td { padding: 8px; text-align: center; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1); }
        th { background: var(--panel); color: var(--accent); position: sticky; left: 0; }
        .active-day { background: rgba(56, 189, 248, 0.15); }
        .is-today { color: var(--highlight); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div id="live-date">---</div>
    <div class="live-time" id="h-m">00:00</div>
</header>

<div id="msg-ticker">Lade Zitate...</div>

<section id="lehrer-section">
    <h2>Lehrer Präsenz (Woche)</h2>
    <div id="lehrer-list"></div>
</section>

<section id="plaene-section">
    <h2>Stundenpläne</h2>
    
    <div id="plans-container">
        </div>
</section>

<script>
    const quotes = ["Focus on.", "Stay focused.", "Viel Erfolg heute.", "Dummheit ist auch eine Begabung.", "Vertrauen ist gut - Kontrolle ist besser"];
    let currentQuote = quotes[0];
    let SCHOOL_DATA = {};
    const daysShort = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];
    const slots = [
        { s: "08:30", e: "09:00" }, { s: "09:10", e: "09:40" }, { s: "09:50", e: "10:20" }, 
        { s: "10:30", e: "11:00" }, { s: "11:10", e: "11:40" }, { s: "11:50", e: "12:20" }, 
        { s: "12:30", e: "13:00" }, { s: "13:00", e: "13:35", label: "PAUSE" },
        { s: "13:40", e: "14:10" }, { s: "14:15", e: "14:45" }, { s: "14:55", e: "15:25" }, { s: "15:30", e: "16:00" }
    ];

    async function init() {
        try {
            const resp = await fetch('data.json?t=' + Date.now());
            SCHOOL_DATA = await resp.json();
            renderLehrer();
            renderTables();
            updateLive();
        } catch (e) { console.error("Datenfehler"); }
    }

    function renderLehrer() {
        const container = document.getElementById('lehrer-list');
        let html = "";
        (SCHOOL_DATA.lehrerPlan || []).forEach(l => {
            html += `<div class="card lehrer-card">
                <span class="lehrer-name">${l.name}</span>
                <div class="lehrer-info">${l.fach}</div>
                <div>`;
            for(let d=1; d<=5; d++) {
                const isPresent = l.zeiten?.[d] && l.zeiten[d].some(z => z[0] !== "");
                html += `<span class="day-badge ${isPresent?'has-time':''}">${daysShort[d]}</span>`;
            }
            html += `</div></div>`;
        });
        container.innerHTML = html;
    }

    function renderTables() {
        const container = document.getElementById('plans-container');
        const today = new Date().getDay();
        let html = "";

        ["10", "11", "12"].forEach(classId => {
            html += `<h3 style="margin-left:5px; font-size:0.9rem; opacity:0.8;">KLASSE ${classId}</h3>
                     <div class="scroll-box"><table><thead><tr><th>Zeit</th>`;
            for(let d=1; d<=5; d++) {
                html += `<th class="${d===today?'is-today':''}">${daysShort[d]}</th>`;
            }
            html += `</tr></thead><tbody>`;
            
            slots.forEach(slot => {
                html += `<tr><th>${slot.s}</th>`;
                if(slot.label) {
                    html += `<td colspan="5" style="color:var(--pause); font-weight:bold;">${slot.label}</td>`;
                } else {
                    for(let d=1; d<=5; d++) {
                        const cell = SCHOOL_DATA.fullSchedules[classId]?.[d]?.[slot.s] || "";
                        html += `<td class="${d===today?'active-day':''}">${cell}</td>`;
                    }
                }
                html += `</tr>`;
            });
            html += `</tbody></table></div>`;
        });
        container.innerHTML = html;
    }

    function updateLive() {
        const now = new Date();
        document.getElementById('h-m').textContent = now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('live-date').textContent = now.toLocaleDateString('de-DE', {weekday:'long', day:'2-digit', month:'short'});
        
        // Zitat Update
        const h = now.getHours();
        const ticker = document.getElementById('msg-ticker');
        if (h >= 16) ticker.textContent = "Schönen Feierabend!";
        else ticker.textContent = currentQuote;
    }

    setInterval(updateLive, 1000);
    setInterval(() => { currentQuote = quotes[Math.floor(Math.random() * quotes.length)]; }, 30000);
    
    init();
</script>
</body>
</html>
